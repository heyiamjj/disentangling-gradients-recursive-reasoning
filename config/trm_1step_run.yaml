arch:
  H_cycles: 3
  H_layers: 0
  L_cycles: 6
  L_layers: 2
  expansion: 4
  forward_dtype: float32
  halt_exploration_prob: 0.1
  halt_max_steps: 4
  hidden_size: 384
  loss:
    loss_type: stablemax_cross_entropy
    name: losses@ACTLossHead
  mlp_t: false
  name: recursive_reasoning.trm@TinyRecursiveReasoningModel_ACTV1
  no_ACT_continue: true
  num_heads: 8
  pos_encodings: rope
  puzzle_emb_len: 16
  puzzle_emb_ndim: 384
beta1: 0.9
beta2: 0.95
checkpoint_every_eval: true
checkpoint_path: checkpoints/trm_1step_final
data_paths:
- data/sudoku-extreme-1k
data_paths_test: []
ema: true
ema_rate: 0.999
epochs: 10000
eval_interval: 5000
evaluators: []
freeze_weights: false
global_batch_size: 512
lr: 0.0001
lr_min_ratio: 1.0
lr_warmup_steps: 2000
min_eval_interval: 0
project_name: TRM-1step-Final
puzzle_emb_lr: 0.01
puzzle_emb_weight_decay: 0.1
run_name: trm_1step_final
seed: 0
weight_decay: 0.1
